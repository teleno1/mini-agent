name: Quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Install locked development dependencies
        run: uv sync --frozen --all-groups
      - name: Check formatting
        run: uv run --frozen ruff format --check .
      - name: Lint
        run: uv run --frozen ruff check .
      - name: Typecheck
        run: uv run --frozen mypy
      - name: Run offline tests
        run: uv run --frozen pytest
      - name: Build and audit distributions
        run: uv run --frozen python scripts/build_artifacts.py
      - name: Install and smoke-test both distributions
        run: uv run --frozen python scripts/smoke_artifacts.py
